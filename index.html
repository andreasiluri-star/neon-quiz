font-family:'Chakra Petch',sans-serif;padding:16px;position:relative;overflow-x:hidden}
.scan{position:fixed;inset:0;pointer-events:none;z-index:50;background:repeating-linear-gradient(0deg,rgba(0,0,0,.18) 0 1px,transparent 1px 3px)}
.machine{width:100%;max-width:420px;min-height:660px;background:linear-gradient(160deg,#14082b 0%,#0a0418 100%);
border:2px solid rgba(177,75,255,.3);border-radius:18px;box-shadow:0 0 60px rgba(177,75,255,.25),inset 0 0 40px rgba(0,0,0,.6);padding:6px}
.screen{padding:30px 22px}
.crt{text-align:center;margin-bottom:26px}
h1{font-family:'Press Start 2P',monospace;font-size:28px;color:#fff;margin:14px 0;text-shadow:0 0 12px #ff2e88,0 0 24px #b14bff;letter-spacing:1px}
.sub{font-family:'Press Start 2P',monospace;font-size:8px;color:#00e5ff;letter-spacing:2px}
.label{font-family:'Press Start 2P',monospace;font-size:9px;color:rgba(255,255,255,.55);margin-bottom:14px;letter-spacing:1px}
.themeRow{display:flex;align-items:center;gap:12px;padding:13px 16px;background:rgba(255,255,255,.02);border:2px solid rgba(255,255,255,.12);border-radius:10px;cursor:pointer;color:rgba(255,255,255,.45);margin-bottom:10px;transition:all .2s;width:100%;font-family:'Chakra Petch',sans-serif}
.themeRow .nm{font-size:14px;font-weight:700;letter-spacing:1px;flex:1;text-align:left}
.led{width:12px;height:12px;border-radius:50%;border:2px solid rgba(255,255,255,.2);transition:all .2s}
.btn{width:100%;padding:18px;font-family:'Press Start 2P',monospace;font-size:14px;border:2px solid #00ff9d;border-radius:10px;background:rgba(0,255,157,.08);color:#00ff9d;cursor:pointer;letter-spacing:1px;text-shadow:0 0 8px #00ff9d;box-shadow:0 0 20px rgba(0,255,157,.3);transition:transform .08s,filter .2s}
.btn:active{transform:translateY(2px) scale(.98)}.btn:hover{filter:brightness(1.15)}
.btn:disabled{opacity:.35;cursor:default}
.prog{display:flex;justify-content:space-between;align-items:center;gap:8px;margin-top:16px;font-family:'Press Start 2P',monospace;font-size:7px;color:rgba(255,255,255,.5);letter-spacing:1px}
.reset{font-family:'Press Start 2P',monospace;font-size:7px;background:transparent;border:1px solid rgba(255,255,255,.2);color:rgba(255,255,255,.6);padding:6px 10px;border-radius:6px;cursor:pointer;letter-spacing:1px}
.notice{margin-top:14px;font-size:12px;color:#ffe600;line-height:1.5;border:1px solid rgba(255,230,0,.3);background:rgba(255,230,0,.06);padding:10px 12px;border-radius:8px}
.hud{display:flex;align-items:center;gap:10px;margin-bottom:16px;font-family:'Press Start 2P',monospace;font-size:9px}
.hud .mult{margin-left:auto;color:#b14bff;text-shadow:0 0 8px #b14bff}
.hud .lvl{color:#00e5ff}.hud .combo{color:#ff2e88;text-shadow:0 0 8px #ff2e88}
.track{height:8px;background:rgba(255,255,255,.06);border-radius:6px;overflow:hidden;margin-bottom:22px;border:1px solid rgba(255,255,255,.1)}
.fill{height:100%;transition:width 1s linear}
.tag{display:inline-block;font-family:'Press Start 2P',monospace;font-size:8px;padding:6px 10px;border:1px solid;border-radius:6px;margin-bottom:14px;letter-spacing:1px}
.qbox{background:rgba(255,255,255,.03);border:2px solid;border-radius:12px;padding:22px 18px;margin-bottom:20px;min-height:80px;display:flex;align-items:center}
.qbox p{font-size:19px;font-weight:700;color:#fff;line-height:1.4}
.ans{position:relative;text-align:left;padding:15px 16px 15px 50px;border-radius:9px;border:2px solid rgba(255,255,255,.15);background:rgba(255,255,255,.02);color:#fff;font-size:15px;font-weight:600;cursor:pointer;font-family:'Chakra Petch',sans-serif;width:100%;margin-bottom:10px;transition:transform .1s}
.ans:hover{transform:translateX(4px)}
.ans .k{position:absolute;left:14px;top:50%;transform:translateY(-50%);width:24px;height:24px;border-radius:6px;background:rgba(255,255,255,.08);display:flex;align-items:center;justify-content:center;font-family:'Press Start 2P',monospace;font-size:9px}
.ans .mk{position:absolute;right:14px;top:50%;transform:translateY(-50%);font-size:18px}
.next{width:100%;margin-top:18px;padding:15px;font-family:'Press Start 2P',monospace;font-size:11px;border:2px solid;border-radius:10px;background:rgba(255,255,255,.03);cursor:pointer;letter-spacing:1px}
.res{text-align:center;padding-top:10px}
.res .emo{font-size:70px}
.res .verd{font-family:'Press Start 2P',monospace;font-size:26px;margin:12px 0 18px;letter-spacing:1px}
.res .sc{font-family:'Press Start 2P',monospace;font-size:44px;color:#ffe600;text-shadow:0 0 16px #ffe60088}
.res .rec{font-family:'Press Start 2P',monospace;font-size:11px;color:#ffe600;margin-top:12px;letter-spacing:1px;text-shadow:0 0 10px #ffe60088}
.res .recsub{font-family:'Press Start 2P',monospace;font-size:8px;color:rgba(255,255,255,.4);margin-top:10px;letter-spacing:1px}
.res .pct{font-family:'Press Start 2P',monospace;font-size:9px;color:rgba(255,255,255,.6);margin-top:12px;letter-spacing:1px}
.stats{display:flex;gap:12px;justify-content:center;margin:26px 0}
.cell{background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.1);border-radius:10px;padding:14px 22px;display:flex;flex-direction:column;gap:6px;font-family:'Press Start 2P',monospace}
.cell b{font-size:18px}.cell span{font-size:7px;color:rgba(255,255,255,.5);letter-spacing:1px}
.ghost{width:100%;margin-top:10px;padding:13px;font-family:'Press Start 2P',monospace;font-size:9px;border:1px solid rgba(255,255,255,.2);border-radius:10px;background:transparent;color:rgba(255,255,255,.6);cursor:pointer;letter-spacing:1px}
.hidden{display:none}

function makeLogic(used){

  const ty=ri(0,5);let q,c,sig;
  if(ty==0){const a=ri(11,19),b=ri(11,19);c=a*b;q="Quanto fa "+a+" \u00D7 "+b+"?";sig="m"+a+"x"+b;}

  if(used.has(sig))continue;used.add(sig);
  const opts=new Set([c]);
  while(opts.size<4){const d=ri(1,Math.max(4,Math.round(c*0.15)));const cand=Math.random()<.5?c+d:c-d;if(cand>0&&cand!=c)opts.add(cand);}

  return{q:q,answers:arr,correct:arr.indexOf(String(c))};
 }

  const tdiv=document.getElementById("themes");
  Object.entries(META).forEach(([k,m])=>{
   const on=S.themes.includes(k);
   const b=document.createElement("button");b.className="themeRow";
   b.style.borderColor=on?m[2]:"rgba(255,255,255,.12)";
   b.style.color=on?m[2]:"rgba(255,255,255,.45)";
   b.style.boxShadow=on?`0 0 14px ${m[2]}66, inset 0 0 14px ${m[2]}22`:"none";
   b.innerHTML=`<span style="font-size:22px">${m[1]}</span><span class="nm">${m[0]}</span><span class="led" style="background:${on?m[2]:'transparent'};border-color:${on?m[2]:'rgba(255,255,255,.2)'};box-shadow:${on?'0 0 10px '+m[2]:'none'}"></span>`;
   b.onclick=()=>{S.themes=on?S.themes.filter(x=>x!=k):[...S.themes,k];render();};
   tdiv.appendChild(b);
  });
  if(S.notice)document.getElementById("notice").innerHTML=`<div class="notice">${S.notice}</div>`;
  const sb=document.getElementById("start");sb.disabled=!S.themes.length;sb.onclick=start;
  document.getElementById("reset").onclick=()=>{S.seen={};saveSeen({});S.notice="Progresso azzerato. Tutte le domande sono di nuovo disponibili.";render();};
 }
 else if(S.screen=="playing"){
  const cur=S.game[S.idx],m=META[cur.theme],acc=m[2];
  app.innerHTML=`<div class="hud"><span style="color:rgba(255,255,255,.7)">SCORE <b style="color:#ffe600">${pad(S.score)}</b></span>
   <span class="mult" style="opacity:${S.idx>0?1:.4}">\u00D7${multFor(S.idx).toFixed(2)}</span>
   <span class="lvl">${S.idx+1}/${S.game.length}</span>${S.streak>=2?`<span class="combo">COMBO \u00D7${S.streak}</span>`:""}</div>
   <div class="track"><div class="fill" id="fill" style="width:${(S.time/timeFor(S.idx))*100}%;background:${S.time<=4?'#ff2e88':acc};box-shadow:0 0 12px ${S.time<=4?'#ff2e88':acc}"></div></div>
   <div class="tag" style="color:${acc};border-color:${acc}">${m[1]} ${m[0]}</div>
   <div class="qbox" style="border-color:${acc}55;box-shadow:0 0 30px ${acc}22"><p>${cur.q}</p></div>
   <div id="answers"></div><div id="nextwrap"></div>`;
  const adiv=document.getElementById("answers");
  cur.answers.forEach((ans,i)=>{
   const b=document.createElement("button");b.className="ans";
   let bd="rgba(255,255,255,.15)",glow="none",col="#fff",mk="";
   if(S.locked){if(i==cur.correct){bd="#00ff9d";glow="0 0 16px #00ff9d66";col="#00ff9d";mk="\u2713";}else if(i==S.chosen){bd="#ff2e88";glow="0 0 16px #ff2e8866";col="#ff2e88";mk="\u2715";}}
   b.style.borderColor=bd;b.style.boxShadow=glow;b.style.color=col;
   b.innerHTML=`<span class="k">${String.fromCharCode(65+i)}</span>${ans}${mk?`<span class="mk">${mk}</span>`:""}`;
   b.onclick=()=>answer(i);adiv.appendChild(b);
  });
  if(S.locked){
   const nw=document.getElementById("nextwrap");
   const acc2=META[cur.theme][2];
   nw.innerHTML=`<button class="next" id="next" style="border-color:${acc2};color:${acc2}">${S.idx+1>=S.game.length?"RISULTATO \u25B6":"NEXT \u25B6"}</button>`;
   document.getElementById("next").onclick=next;
  }
 }
 else if(S.screen=="result"){
  const pct=Math.min(100,Math.round((S.score/maxScore)*100));
  let v;if(pct>=85)v=["PERFECT","\u{1F47E}","#00ff9d"];else if(pct>=60)v=["GREAT","\u{1F579}\uFE0F","#00e5ff"];else if(pct>=35)v=["NOT BAD","\u{1F4BE}","#ffe600"];else v=["GAME OVER","\u{1FA99}","#ff2e88"];
  app.innerHTML=`<div class="res"><div class="emo">${v[1]}</div><div class="verd" style="color:${v[2]}">${v[0]}</div>
   <div class="sc">${pad(S.score)}</div>
   ${S.newRec?`<div class="rec">\u{1F3C6} NUOVO RECORD!</div>`:`<div class="recsub">RECORD ${pad(S.best)}</div>`}
   <div class="pct">${pct}% \u00B7 ${S.correct}/${S.game.length} CORRETTE</div>
   <div class="stats"><div class="cell"><b style="color:#ff2e88">\u00D7${S.bestStreak}</b><span>MAX COMBO</span></div><div class="cell"><b style="color:#00e5ff">${S.game.length}</b><span>DOMANDE</span></div></div>
   <button class="btn" id="again">\u25B6 RIGIOCA</button><button class="ghost" id="home">\u25C2 CAMBIA MONDI</button></div>`;
  document.getElementById("again").onclick=start;
  document.getElementById("home").onclick=()=>{S.screen="home";render();};
 }
}
function start(){
 const themes=S.themes.length?S.themes:Object.keys(META);
 const{game,exhausted}=buildGame(themes,S.seen);
 if(exhausted){S.notice="Hai esaurito le domande scritte di questi temi! Azzera il progresso o aggiungi la Logica (infinita).";render();return;}
 S.notice="";S.game=game;S.idx=0;S.score=0;S.streak=0;S.bestStreak=0;S.correct=0;S.chosen=null;S.locked=false;S.time=timeFor(0);S.newRec=false;S.screen="playing";
 render();tick();
}
function tick(){
 clearTimeout(S.timer);
 if(S.screen!="playing"||S.locked)return;
 if(S.time<=0){answer(-1);return;}
 S.timer=setTimeout(()=>{S.time--;const f=document.getElementById("fill");if(f){const acc=META[S.game[S.idx].theme][2];f.style.width=(S.time/timeFor(S.idx))*100+"%";f.style.background=S.time<=4?"#ff2e88":acc;f.style.boxShadow="0 0 12px "+(S.time<=4?"#ff2e88":acc);}tick();},1000);
}
function answer(i){
 if(S.locked)return;S.locked=true;S.chosen=i;clearTimeout(S.timer);
 const cur=S.game[S.idx];
 if(cur.kind=="w"){S.seen[cur.id]=1;saveSeen(S.seen);}
 if(i==cur.correct){const mt=timeFor(S.idx);const bonus=Math.round((S.time/mt)*50);S.score+=Math.round((100+bonus)*multFor(S.idx));S.correct++;S.streak++;if(S.streak>S.bestStreak)S.bestStreak=S.streak;}
 else{S.streak=0;}
 render();
}
function next(){
 if(S.idx+1>=S.game.length){if(S.score>S.best){S.best=S.score;S.newRec=true;saveBest(S.best);}else S.newRec=false;S.screen="result";clearTimeout(S.timer);render();}
 else{S.idx++;S.chosen=null;S.locked=false;S.time=timeFor(S.idx);render();tick();}
}
render();
</script>
</body>
</html>
